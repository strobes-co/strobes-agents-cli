name: Release

# Tag a release to trigger:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: tui

      - name: Build release binary
        run: cargo build --manifest-path tui/Cargo.toml --release --target ${{ matrix.target }}

      - name: Package
        run: |
          BIN=tui/target/${{ matrix.target }}/release/strobes-tui
          DIST=strobes-tui-${{ matrix.target }}
          mkdir -p "$DIST"
          cp "$BIN" "$DIST/"
          cp README.md tui/README.md "$DIST/" 2>/dev/null || true
          tar czf "$DIST.tar.gz" "$DIST"
          shasum -a 256 "$DIST.tar.gz" > "$DIST.tar.gz.sha256"

      - uses: actions/upload-artifact@v4
        with:
          name: strobes-tui-${{ matrix.target }}
          path: |
            strobes-tui-${{ matrix.target }}.tar.gz
            strobes-tui-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
