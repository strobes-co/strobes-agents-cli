name: Release

# Tag a release to trigger:  git tag v0.1.0 && git push origin v0.1.0
on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libssl-dev pkg-config
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          DIST=strobes-${{ matrix.target }}
          mkdir -p "$DIST"
          BIN=strobes
          [ -f "target/${{ matrix.target }}/release/strobes.exe" ] && BIN=strobes.exe
          cp "target/${{ matrix.target }}/release/$BIN" "$DIST/"
          cp README.md "$DIST/" 2>/dev/null || true
          tar czf "$DIST.tar.gz" "$DIST"
          # shasum exists on macOS; Windows Git Bash / Linux have sha256sum.
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$DIST.tar.gz" > "$DIST.tar.gz.sha256"
          else
            sha256sum "$DIST.tar.gz" > "$DIST.tar.gz.sha256"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: strobes-${{ matrix.target }}
          path: |
            strobes-${{ matrix.target }}.tar.gz
            strobes-${{ matrix.target }}.tar.gz.sha256

  release:
    name: Publish release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.sha256
          generate_release_notes: true
