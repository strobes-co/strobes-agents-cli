    tasks:

      - name: api-findings-report
        depends_on: [rate-limiting-bypass, race-condition-testing, business-logic-flaws]
        prompt: |
          Compile a professional bug bounty report for ${PROGRAM}'s API security assessment.

          Consolidate all findings from:
            ${OUTPUT_DIR}/idor-findings.txt
            ${OUTPUT_DIR}/mass-assignment-findings.txt
            ${OUTPUT_DIR}/jwt-findings.txt
            ${OUTPUT_DIR}/graphql-vuln-findings.txt
            ${OUTPUT_DIR}/oauth-findings.txt
            ${OUTPUT_DIR}/rate-limit-findings.txt
            ${OUTPUT_DIR}/race-condition-findings.txt
            ${OUTPUT_DIR}/business-logic-findings.txt

          For each confirmed vulnerability, produce a HackerOne-style report section:

          ---
          ## [CRITICAL/HIGH/MEDIUM/LOW] Vulnerability Title

          **CVSS Score:** X.X (CVSS:3.1/AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N)
          **CWE:** CWE-XXX

          ### Description
          [Clear explanation of the vulnerability]

          ### Steps to Reproduce
          1. Step 1
          2. Step 2
          3. ...

          ### Impact
          [Business impact: data breach, account takeover, financial loss, etc.]

          ### Proof of Concept
          ```
          curl command or code snippet
          ```

          ### Remediation
          [Specific fix recommendation]
          ---

          Priority order for reporting:
          1. CRITICAL: Account takeover, RCE, mass data breach
          2. HIGH: Privilege escalation, mass IDOR, payment bypass
          3. MEDIUM: Limited IDOR, rate limit bypass, JWT weakness
          4. LOW/INFO: Missing headers, verbose errors, info disclosure

          Save the complete report to ${OUTPUT_DIR}/REPORT-${PROGRAM}-API-Security.md
          Also create ${OUTPUT_DIR}/REPORT-SUMMARY.txt with a one-line summary per finding.
